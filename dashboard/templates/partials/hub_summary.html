<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Managed hubs</p>
        <p class="text-2xl font-bold font-mono am4-accent mt-1">{{ stats.total }}</p>
    </div>
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Active</p>
        <p class="text-2xl font-bold font-mono mt-1">{{ stats.active }}</p>
    </div>
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Fresh OK</p>
        <p class="text-2xl font-bold font-mono text-emerald-300 mt-1">{{ stats.fresh_ok }}</p>
        <p class="am4-text-muted text-[10px] mt-1">OK within {{ stats.stale_after_days }}d</p>
    </div>
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Stale</p>
        <p class="text-2xl font-bold font-mono text-orange-300 mt-1">{{ stats.stale_n }}</p>
        <p class="am4-text-muted text-[10px] mt-1">OK but &gt;{{ stats.stale_after_days }}d old</p>
    </div>
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Never / error / running</p>
        <p class="text-2xl font-bold font-mono text-amber-300/90 mt-1">{{ stats.other_n }}</p>
        <p class="am4-text-muted text-[10px] mt-1">Use per-hub Refresh</p>
    </div>
</div>
