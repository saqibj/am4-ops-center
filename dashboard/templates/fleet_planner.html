{% extends "base.html" %}
{% block title %}Fleet Planner{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-2">Fleet planner</h2>
<p class="am4-text-secondary mb-6">Aircraft under budget at this hub, ranked by average route profit. Days to break-even = cost ÷ avg daily profit.</p>

<form id="fleet-filters" class="flex flex-wrap gap-4 mb-6 items-end">
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Hub</label>
        <select name="hub"
                hx-get="/api/fleet-plan"
                hx-target="#fleet-results"
                hx-include="#fleet-filters"
                hx-indicator="#fleet-spinner"
                class="am4-input rounded-md px-3 py-2 min-w-[8rem] font-mono">
            <option value="">Select…</option>
            {% for h in hubs %}
            {% set fhb = hub_freshness_by_iata.get(h|upper, {}) %}
            <option value="{{ h }}">{{ h }}{{ fhb.get('option_suffix', '') }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Budget ($)</label>
        <input type="number" name="budget" value="200000000" step="1000000" min="0"
               hx-get="/api/fleet-plan"
               hx-target="#fleet-results"
               hx-trigger="change delay:400ms"
               hx-include="#fleet-filters"
               hx-indicator="#fleet-spinner"
               class="am4-input rounded-md px-3 py-2 w-44 font-mono">
    </div>
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Top N</label>
        <select name="top_n"
                hx-get="/api/fleet-plan"
                hx-target="#fleet-results"
                hx-include="#fleet-filters"
                hx-indicator="#fleet-spinner"
                class="am4-input rounded-md px-3 py-2">
            {% for n in [5, 10, 15, 25, 50] %}
            <option value="{{ n }}" {% if n == 15 %}selected{% endif %}>{{ n }}</option>
            {% endfor %}
        </select>
    </div>
    <label class="flex items-center gap-2 text-sm am4-text-secondary cursor-pointer pb-2">
        <input type="checkbox" name="hide_owned" value="1"
               hx-get="/api/fleet-plan"
               hx-target="#fleet-results"
               hx-trigger="change"
               hx-include="#fleet-filters"
               hx-indicator="#fleet-spinner"
               class="h-4 w-4 rounded border am4-border accent-[var(--accent)] focus:ring-2 focus:ring-[var(--accent)]">
        <span>Hide types I already own</span>
    </label>
    <span id="fleet-spinner" class="htmx-indicator am4-accent text-sm pb-2">Loading…</span>
</form>

<div id="fleet-results">
    <p class="am4-text-secondary">Select a hub and budget.</p>
</div>
{% endblock %}
