{% if not rows %}
<p class="am4-text-muted text-xs px-2 py-1.5 am4-bordered rounded-md am4-panel">No matches.</p>
{% else %}
<div class="am4-bordered rounded-md am4-panel max-h-52 overflow-y-auto text-sm shadow-lg">
    {% for r in rows %}
    <button type="button"
            class="block w-full text-left px-3 py-2 am4-row-hover-soft border-b am4-bordered last:border-b-0"
            data-iata="{{ r.iata }}"
            onclick="(function(btn){var id='{{ field_id }}';var el=document.getElementById(id);if(el)el.value=btn.dataset.iata;var p=btn.closest('.search-ac-panel');if(p)p.innerHTML='';})(this)">
        <span class="font-mono am4-accent">{{ r.iata }}</span>
        <span class="am4-text-secondary">{% if r.name %}{{ r.name }}{% elif r.fullname %}{{ r.fullname }}{% else %}—{% endif %}</span>
        {% if r.country %}<span class="am4-text-muted text-xs"> · {{ r.country }}</span>{% endif %}
    </button>
    {% endfor %}
</div>
{% endif %}
