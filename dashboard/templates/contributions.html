{% extends "base.html" %}
{% block title %}Contributions{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-2">Contribution optimizer</h2>
<p class="am4-text-secondary mb-6">Routes by alliance contribution; C/P ratio = contribution ÷ profit per day.</p>

<form id="contrib-filters" class="flex flex-wrap gap-4 mb-6 items-end">
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Hub</label>
        <select name="hub"
                hx-get="/api/contributions"
                hx-target="#contrib-results"
                hx-include="#contrib-filters"
                hx-indicator="#contrib-spinner"
                class="am4-input rounded-md px-3 py-2 min-w-[8rem] font-mono">
            <option value="">All hubs</option>
            {% for h in hubs %}
            {% set fhb = hub_freshness_by_iata.get(h|upper, {}) %}
            <option value="{{ h }}">{{ h }}{{ fhb.get('option_suffix', '') }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Aircraft type</label>
        <select name="ac_type"
                hx-get="/api/contributions"
                hx-target="#contrib-results"
                hx-include="#contrib-filters"
                hx-indicator="#contrib-spinner"
                class="am4-input rounded-md px-3 py-2">
            <option value="">All</option>
            <option value="PAX">PAX</option>
            <option value="CARGO">CARGO</option>
            <option value="VIP">VIP</option>
        </select>
    </div>
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Min contribution</label>
        <input type="number" name="min_contribution" value="0" step="1000"
               hx-get="/api/contributions"
               hx-target="#contrib-results"
               hx-trigger="change delay:400ms"
               hx-include="#contrib-filters"
               hx-indicator="#contrib-spinner"
               class="am4-input rounded-md px-3 py-2 w-40 font-mono">
    </div>
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Rows</label>
        <select name="limit"
                hx-get="/api/contributions"
                hx-target="#contrib-results"
                hx-include="#contrib-filters"
                hx-indicator="#contrib-spinner"
                class="am4-input rounded-md px-3 py-2">
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500" selected>500</option>
            <option value="1000">1000</option>
            <option value="2500">2500</option>
        </select>
    </div>
    <div>
        <label class="block text-xs am4-text-secondary mb-1">Sort</label>
        <select name="sort"
                hx-get="/api/contributions"
                hx-target="#contrib-results"
                hx-include="#contrib-filters"
                hx-indicator="#contrib-spinner"
                class="am4-input rounded-md px-3 py-2">
            <option value="contribution">Contribution</option>
            <option value="contrib_ratio">C/P ratio</option>
            <option value="profit_per_ac_day">Profit/Day</option>
            <option value="hub">Hub</option>
            <option value="destination">Destination</option>
            <option value="aircraft">Aircraft</option>
        </select>
    </div>
    <span id="contrib-spinner" class="htmx-indicator am4-accent text-sm pb-2">Loading…</span>
</form>

<div id="contrib-results"
     hx-get="/api/contributions"
     hx-trigger="load"
     hx-include="#contrib-filters"
     hx-indicator="#contrib-spinner">
    <p class="am4-text-secondary">Loading…</p>
</div>
{% endblock %}
