<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Route rows</p>
        <p class="text-2xl font-bold font-mono am4-accent mt-1">{{ stats.nrows }}</p>
    </div>
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Aircraft assigned (sum)</p>
        <p class="text-2xl font-bold font-mono mt-1">{{ stats.assigned }}</p>
    </div>
    <div class="am4-card rounded-lg shadow-lg p-4">
        <p class="am4-text-secondary text-xs uppercase tracking-wider">Est. profit / day</p>
        <p class="text-2xl font-bold font-mono text-emerald-300 mt-1">${{ "{:,.0f}".format(stats.est_profit or 0) }}</p>
    </div>
</div>
