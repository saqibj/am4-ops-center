<tr id="recent-add-row-{{ row.token }}" class="hover:bg-slate-800/40">
    <td class="py-2 pr-3 font-mono text-xs text-slate-200">
        {{ row.origin_iata }}→{{ row.dest_iata }}
    </td>
    <td class="py-2 pr-3 font-mono text-xs am4-text-secondary">{{ row.aircraft_short }}</td>
    <td class="py-2 pr-3 text-xs am4-text-muted whitespace-nowrap">{{ row.ago_label }}</td>
    <td class="py-2 text-right">
        <button type="button"
                class="am4-link-danger text-xs underline"
                hx-get="/api/routes/recent-adds/{{ row.token }}/confirm"
                hx-target="#recent-add-row-{{ row.token }}"
                hx-swap="outerHTML">
            Delete
        </button>
    </td>
</tr>
