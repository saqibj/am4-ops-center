<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Managed hubs</p>
        <p class="text-2xl font-bold font-mono text-emerald-400 mt-1">{{ stats.total }}</p>
    </div>
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Active</p>
        <p class="text-2xl font-bold font-mono text-gray-100 mt-1">{{ stats.active }}</p>
    </div>
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Fresh OK</p>
        <p class="text-2xl font-bold font-mono text-emerald-300 mt-1">{{ stats.fresh_ok }}</p>
        <p class="text-gray-500 text-[10px] mt-1">OK within {{ stats.stale_after_days }}d</p>
    </div>
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Stale</p>
        <p class="text-2xl font-bold font-mono text-orange-300 mt-1">{{ stats.stale_n }}</p>
        <p class="text-gray-500 text-[10px] mt-1">OK but &gt;{{ stats.stale_after_days }}d old</p>
    </div>
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Never / error / running</p>
        <p class="text-2xl font-bold font-mono text-amber-300/90 mt-1">{{ stats.other_n }}</p>
        <p class="text-gray-500 text-[10px] mt-1">Use per-hub Refresh</p>
    </div>
</div>
